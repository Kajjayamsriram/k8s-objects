---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy1
spec:
  replicas: 2
  selector:
     matchLabels:
       client: ecom
  template:
    metadata:
      labels:
        client: ecom
    spec:
      containers:
        - name: cont1
          image: shaikmustafa/cycle
          ports:
            - containerPort: 80
          volumeMounts:
            - name: vol2
              mountPath: /usr/share/nginx/html 
      volumes:
        - name: vol2
          persistentVolumeClaim:
            claimName: efs-pvc 
