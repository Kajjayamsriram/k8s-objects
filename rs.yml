---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs1
spec:
  replicas: 2
  selector:
     matchLabels:
       client: ecom
  template:
    metadata:
      labels:
        client: ecom
    spec:
      containers:
        - name: cont1
          image: sriramk16/beauty
          ports:
            - containerPort: 80
  
