---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: r1
  namespace: develop
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["list", "create", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "create", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb1
  namespace: develop
subjects:
  - kind: User
    name: ram
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: r1
  apiGroup: rbac.authorization.k8s.io

