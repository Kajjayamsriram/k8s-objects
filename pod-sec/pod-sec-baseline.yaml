apiVersion: v1
kind: Pod
metadata:
  name: baseline-pod
  namespace: baseline-ns
spec:
  securityContext:
    #runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    # seccompProfile:
    #   type: RuntimeDefault
  containers:
    - name: cont1
      image: busybox
      command: ["sleep", "6000"]
      ports:
        - containerPort: 80
      
      resources:
        limits:
          cpu: "100m"
          memory: "256Mi"
        requests:
          cpu: "50m"
          memory: "156Mi"
      securityContext:
        seLinuxOptions: 
          type: container_t
        allowPrivilegeEscalation: true #True for Baseline
        #runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          add: ['SYS_CHROOT', 'CHOWN', 'KILL', 'SETGID', 'SETUID'] 
      volumeMounts:
        - name: data
          mountPath: /tmp
  volumes:
    - name: data
      emptyDir: {}

#Privileged pod
#Can have hostpathVol, privileged cont(sudo su)
#hostNetwork: true, seLinuxOptions: type: spc_t
#capabilities - SYS_ADMIN, SYS_TIME, NET_ADMIN
