apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-not-ready-alert
  labels:
    release: prometheus
spec:
  groups:
    - name: node.rules
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes node is NotReady"
            description: "Node {{ $labels.node }} has been in the NotReady state for more than 1 minutes."
